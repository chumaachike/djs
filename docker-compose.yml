services:
  postgres:
    image: postgres:16
    container_name: job_scheduler_postgres
    environment:
      - POSTGRES_USER=jobrunner
      - POSTGRES_PASSWORD=local_dev_password
      - POSTGRES_DB=jobrunner
    ports:
      - "5433:5432"
    volumes:
      - ./database/migrations/001_create_jobs.sql:/docker-entrypoint-initdb.d/001_create_jobs.sql
      - postgres_data:/var/lib/postgresql/data
  api:
    build: ./app
    container_name: job_scheduler_api
    environment:
      DATABASE_URL: postgresql+psycopg://jobrunner:local_dev_password@postgres:5432/jobrunner
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data: